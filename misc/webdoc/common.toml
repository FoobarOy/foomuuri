# This file is needed for build documentation for versions 0.27 - 0.32.

# [project] (in docs/nav.toml)
site_name = "Foomuuri"
site_url = "https://foomuuri.foobar.fi/latest"
repo_url = "https://github.com/FoobarOy/foomuuri"
copyright = "Copyright 2023-2026, Kim B. Heino, Foobar Oy and contributors."

[project.extra.version]
provider = "mike"
alias = true

[project.theme]
custom_dir = "overrides"

features = [
    "content.code.copy",
    "content.code.select",
    "navigation.expand",
    "navigation.path",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

# Palette toggle for automatic mode
[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

# Palette toggle for light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

# Palette toggle for dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.superfences]
