zone {
  localhost
  public
}

localhost-public {
  tcp 2000 daddr 10.0.1.0/24
  tcp 2001 daddr -10.0.1.0/24

  tcp 2002 daddr fffe:fff0:fff1:fff2:fff3:fff4:fff5:fff6
  tcp 2003 daddr fffe:fff0:fff1:fff2:fff3:fff4:fff5:fff6/96
  tcp 2004 daddr ::10:0:0:f00/-64
  tcp 2005 daddr -::10:0:0:f00/-64

  tcp 1000 saddr_rate "30/second burst 50"
  tcp 1001 saddr_rate "30/second burst 50" saddr_rate_mask 24 56
  tcp 1002 daddr_rate "40/second" daddr_rate_mask 8 64
}
