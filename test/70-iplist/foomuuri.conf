zone {
  localhost
  public
}

iplist {
  timeout 1h 2m  # backward compabiliy (v0.27)
  url_refresh=1d2h3m
  @empty
  @empty_no_merge merge=no
  @one    10.0.0.1
  @two    10.0.0.1 ff00::1 /non/existing/file|missing-ok dns_refresh=3h
  @three  10.0.0.4 10.0.0.5 ff00::1 /non/existing/file|missing-ok dns_refresh=3h merge=no
  @start  10.0.0.6 start=no
  @file   ./iplist.txt url_timeout=40000d
  @dns    localhost dns_timeout=40000d
}
