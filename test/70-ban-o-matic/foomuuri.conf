zone {
  localhost
  public
}

iplist {
  # List of known good hosts, don't block these
  @good    192.168.0.0/24 foobar.fi

  # IP address will be banned for 5 minutes
  @banned  dynamic=yes element_timeout=5m
}

public-localhost {
  # Drop all new traffic if IP address is in @banned iplist
  saddr @banned drop log + ":banned"

  # Allow SSH from known good hosts and with rate limit.
  # Add overflow SSH connections to @banned iplist.
  ssh saddr @good
  ssh saddr_rate "3/minute"
  ssh iplist_update saddr @banned drop log + ":ban-ssh"

  # ...other normal rules...

  # Instead of normal final "drop log":
  # - Allow 1/min + 10 dropped connections without ban.
  # - Add overflow attemps to @banned iplist.
  saddr_rate "1/minute burst 10" drop log
  iplist_update saddr @banned drop log + ":ban"
}
