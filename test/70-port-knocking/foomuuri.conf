zone {
  localhost
  public
}

iplist {
  # Port knocking is valid for 30 seconds
  @knock  dynamic=yes element_timeout=30s
}

public-localhost {
  # Allow ssh if IP address is in @knock iplist
  ssh saddr @knock

  # Add source IP address to @knock iplist if there's UDP packet to port 5042
  udp 5042 iplist_update saddr @knock drop log + ":knock"

  # Delete IP address from @knock iplist if there's packet to any other port
  saddr @knock iplist_delete saddr @knock continue log + ":unknock"

  # ...normal rules...
  drop log
}
